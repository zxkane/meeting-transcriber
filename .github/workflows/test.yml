name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'plugins/funasr-transcriber/skills/funasr-transcribe/scripts/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'plugins/funasr-transcriber/skills/funasr-transcribe/scripts/**'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        working-directory: plugins/funasr-transcriber/skills/funasr-transcribe/scripts
        run: python -m pytest test_speaker_verification.py -v
