name: ClawHub Skill Publish

on:
  pull_request:
    paths:
      - 'plugins/funasr-transcriber/skills/funasr-transcribe/SKILL.md'
      - '.github/workflows/clawhub-publish.yml'
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          version=$(grep '^version:' plugins/funasr-transcriber/skills/funasr-transcribe/SKILL.md | head -1 | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  dry-run:
    needs: resolve-version
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bunx clawhub publish plugins/funasr-transcriber/skills/funasr-transcribe --slug zxkane-audio-transcriber-funasr --version ${{ needs.resolve-version.outputs.version }} --dry-run

  publish:
    needs: resolve-version
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bunx clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      - run: bunx clawhub publish plugins/funasr-transcriber/skills/funasr-transcribe --slug zxkane-audio-transcriber-funasr --version ${{ needs.resolve-version.outputs.version }} --tags latest
